services:
  schedule-manager:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${SCHEDULE_MANAGER_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      FASTIFY_REQUEST_TIMEOUT_MS: "${FASTIFY_REQUEST_TIMEOUT_MS:-3600000}"
      FASTIFY_CONNECTION_TIMEOUT_MS: "${FASTIFY_CONNECTION_TIMEOUT_MS:-3600000}"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "-O",
          "/dev/null",
          "http://127.0.0.1:3000/api/v1/sync/docker-ping",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 40s
