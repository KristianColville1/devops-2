services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8000' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  node-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${NODE_BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
      DYNAMO_LOCAL: "true"
      AWS_REGION: "us-east-1"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      dynamodb-local:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
