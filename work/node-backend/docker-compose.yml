services:
  node-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${NODE_BACKEND_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      HOST: "0.0.0.0"
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
